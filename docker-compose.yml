version: '3.8'

services:
  agent_orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - APEX_MODE=production
    depends_on:
      - mcp_azure_monitor
      - mcp_cost_management
      - mcp_foundry
      - mcp_database
      - mcp_alerts

  mcp_azure_monitor:
    image: apex/mcp-azure-monitor
    ports:
      - "8001:8000"

  mcp_cost_management:
    image: apex/mcp-cost-management
    ports:
      - "8002:8000"

  mcp_foundry:
    image: apex/mcp-foundry
    ports:
      - "8003:8000"
    environment:
      - FOUNDRY_TENANT_ID=${FOUNDRY_TENANT_ID}

  mcp_database:
    image: apex/mcp-database
    ports:
      - "8004:8000"

  mcp_alerts:
    image: apex/mcp-alerts
    ports:
      - "8005:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - agent_orchestrator
